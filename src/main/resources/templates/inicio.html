<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Concesionario DSVF</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a1a, #3d3d3d);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        .main-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 50px;
            margin-top: 80px;
        }
        h1 {
            font-style: italic;
            font-size: 2.8rem;
            background: linear-gradient(90deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #aaa;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        .foto {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.3);
            margin-bottom: 25px;
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
        }
        .btn-custom {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            padding: 10px 25px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            text-decoration: none;
            margin: 5px;
            display: inline-block;
        }
        .btn-custom:hover {
            background: rgba(255,255,255,0.25);
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .btn-custom.vehiculo { border-color: #6c9fff; color: #6c9fff; }
        .btn-custom.vehiculo:hover { background: #6c9fff; color: #fff; }
        .btn-custom.cliente { border-color: #a0e0a0; color: #a0e0a0; }
        .btn-custom.cliente:hover { background: #a0e0a0; color: #222; }
    </style>
</head>
<body>
<div class="container">
    <div class="main-card text-center">
        <img src="/foto.jpeg" class="foto" alt="Foto alumno">
        <h1>Concesionario DSVF</h1>
        <p class="subtitle">DAW</p>

        <div class="mt-4">
            <a href="/listadoVehiculos" class="btn-custom vehiculo">Listado Vehículos</a>
            <a href="/listadoClientes"  class="btn-custom cliente">Listado Clientes</a>
            <a href="/altaVehiculo"     class="btn-custom vehiculo"> Alta Vehículo</a>
            <a href="/altaCliente"      class="btn-custom cliente"> Alta Cliente</a>
        </div>
    </div>
</div>
</body>
</html>
