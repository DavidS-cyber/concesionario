<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Vehículos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a1a, #3d3d3d);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
        }
        .page-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            margin-top: 50px;
        }
        h2 {
            font-style: italic;
            background: linear-gradient(90deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }
        .table {
            color: #fff;
        }
        .table thead {
            background: rgba(255,255,255,0.1);
        }
        .table tbody tr {
            background: rgba(255,255,255,0.03);
            border-color: rgba(255,255,255,0.05);
            transition: background 0.2s;
        }
        .table tbody tr:hover {
            background: rgba(255,255,255,0.08);
        }
        .btn-volver {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            padding: 8px 20px;
            text-decoration: none;
            transition: all 0.3s;
            margin-right: 10px;
        }
        .btn-volver:hover {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        .btn-add {
            background: rgba(108,159,255,0.2);
            color: #6c9fff;
            border: 1px solid #6c9fff;
            border-radius: 50px;
            padding: 8px 20px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .btn-add:hover {
            background: #6c9fff;
            color: #fff;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="page-card">
        <h2>Listado de Vehículos</h2>
        <div class="mb-4">
            <a href="/inicio" class="btn-volver"> <- Volver</a>
            <a href="/altaVehiculo" class="btn-add">+ Añadir Vehículo</a>
        </div>
        <table class="table table-borderless">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Marca</th>
                    <th>Modelo</th>
                    <th>Año</th>
                    <th>Precio</th>
                    <th>Color</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="v : ${vehiculos}">
                    <td th:text="${v.id}"></td>
                    <td th:text="${v.marca}"></td>
                    <td th:text="${v.modelo}"></td>
                    <td th:text="${v.anio}"></td>
                    <td th:text="${#numbers.formatDecimal(v.precio,1,2)} + ' €'"></td>
                    <td th:text="${v.color}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
