<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Clientes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a1a, #3d3d3d);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
        }
        .page-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            margin-top: 50px;
        }
        h2 {
            font-style: italic;
            background: linear-gradient(90deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }
        .table { color: #fff; }
        .table thead { background: rgba(255,255,255,0.1); }
        .table tbody tr {
            background: rgba(255,255,255,0.03);
            border-color: rgba(255,255,255,0.05);
            transition: background 0.2s;
        }
        .table tbody tr:hover { background: rgba(255,255,255,0.08); }
        .btn-volver {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            padding: 8px 20px;
            text-decoration: none;
            transition: all 0.3s;
            margin-right: 10px;
        }
        .btn-volver:hover { background: rgba(255,255,255,0.2); color: #fff; }
        .btn-add {
            background: rgba(160,224,160,0.2);
            color: #a0e0a0;
            border: 1px solid #a0e0a0;
            border-radius: 50px;
            padding: 8px 20px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .btn-add:hover { background: #a0e0a0; color: #222; }
    </style>
</head>
<body>
<div class="container">
    <div class="page-card">
        <h2> Listado de Clientes</h2>
        <div class="mb-4">
            <a href="/inicio" class="btn-volver"><- Volver</a>
            <a href="/altaCliente" class="btn-add">+ Añadir Cliente</a>
        </div>
        <table class="table table-borderless">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Apellidos</th>
                    <th>Email</th>
                    <th>Teléfono</th>
                    <th>Ciudad</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${clientes}">
                    <td th:text="${c.id}"></td>
                    <td th:text="${c.nombre}"></td>
                    <td th:text="${c.apellidos}"></td>
                    <td th:text="${c.email}"></td>
                    <td th:text="${c.telefono}"></td>
                    <td th:text="${c.ciudad}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
