<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a1a, #3d3d3d);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
        }
        .error-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,80,80,0.3);
            border-radius: 20px;
            padding: 60px 40px;
            margin-top: 100px;
            text-align: center;
        }
        .error-icon { font-size: 5rem; margin-bottom: 20px; }
        h1 {
            font-style: italic;
            color: #ff6b6b;
            font-size: 2.5rem;
        }
        p { color: #aaa; font-size: 1.1rem; }
        .btn-volver {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            padding: 10px 30px;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .btn-volver:hover { background: rgba(255,255,255,0.2); color: #fff; }
    </style>
</head>
<body>
<div class="container">
    <div class="error-card">
        <div class="error-icon">⚠️</div>
        <h1>¡Algo salió mal!</h1>
        <p th:text="${error}">Ha ocurrido un error inesperado.</p>
        <p th:text="${status}"></p>
        <a href="/inicio" class="btn-volver"><- Volver al inicio</a>
    </div>
</div>
</body>
</html>
