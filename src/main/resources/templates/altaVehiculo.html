<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alta Vehículo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a1a, #3d3d3d);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
        }
        .form-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            margin-top: 60px;
            max-width: 550px;
            margin-left: auto;
            margin-right: auto;
        }
        h2 {
            font-style: italic;
            background: linear-gradient(90deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }
        .form-control {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            border-radius: 10px;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.12);
            border-color: #6c9fff;
            color: #fff;
            box-shadow: 0 0 0 3px rgba(108,159,255,0.2);
        }
        .form-label { color: #ccc; }
        .btn-guardar {
            background: linear-gradient(90deg, #4a7fff, #6c9fff);
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 12px;
            width: 100%;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .btn-guardar:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(108,159,255,0.4);
        }
        .btn-volver {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            padding: 8px 20px;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .btn-volver:hover { background: rgba(255,255,255,0.2); color: #fff; }
    </style>
</head>
<body>
<div class="container">
    <div class="form-card">
        <a href="/inicio" class="btn-volver"><- Volver</a>
        <h2>Alta de Vehículo</h2>
        <form th:action="@{/altaVehiculo}" th:object="${vehiculo}" method="post">
            <div class="mb-3">
                <label class="form-label">Marca</label>
                <input type="text" th:field="*{marca}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Modelo</label>
                <input type="text" th:field="*{modelo}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Año</label>
                <input type="number" th:field="*{anio}" class="form-control" min="1990" max="2025" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Precio (€)</label>
                <input type="number" th:field="*{precio}" class="form-control" step="0.01" min="0" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Color</label>
                <input type="text" th:field="*{color}" class="form-control">
            </div>
            <button type="submit" class="btn-guardar">Guardar Vehículo</button>
        </form>
    </div>
</div>
</body>
</html>
